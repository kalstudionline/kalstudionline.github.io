<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Received - Cudio Ai</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #12121a 100%);
            color: #e0e0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 24px;
            text-align: center;
        }
        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5em;
            margin: 0 auto 24px;
        }
        h1 { font-size: 2em; margin-bottom: 12px; }
        p { color: #6b6b80; line-height: 1.6; margin-bottom: 8px; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark">&#10003;</div>
        <h1>Payment Received!</h1>
        <p>Thank you for your order. Your payment has been confirmed.</p>
        <p>We will now research and prepare your custom report. You will receive it at your email within 24 hours.</p>
        <p style="margin-top: 16px; color: #888;">If you have any questions, reach out to us and include your transaction ID.</p>
        <a href="https://kalstudionline.github.io" class="btn">Back to Home</a>
    </div>
</body>
</html>
