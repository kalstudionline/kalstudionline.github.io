<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Confirmed - Cudio Ai</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e8;min-height:100vh}
        .container{max-width:600px;margin:0 auto;padding:40px 20px}
        .card{background:#12121a;border:1px solid #1e1e2e;border-radius:20px;padding:40px 28px;text-align:center}
        .checkmark{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6c5ce7,#00cec9);display:flex;align-items:center;justify-content:center;font-size:1.8em;margin:0 auto 16px}
        h1{font-size:1.5em;margin-bottom:8px}
        .sub{color:#6b6b80;font-size:0.9em;margin-bottom:16px}
        .form-box{background:#12121a;border:1px solid #1e1e2e;border-radius:16px;padding:32px;margin-top:24px;text-align:left}
        .form-box h2{font-size:1.1em;color:#00cec9;margin-bottom:16px}
        .fg{margin-bottom:14px}
        .fg label{display:block;font-size:0.85em;color:#888;margin-bottom:4px}
        .fg input,.fg textarea{width:100%;padding:10px 14px;background:#0a0a0f;border:1px solid #1e1e2e;border-radius:8px;color:#e0e0e8;font-size:0.95em;font-family:inherit}
        .fg input:focus,.fg textarea:focus{outline:none;border-color:#6c5ce7}
        .fg textarea{min-height:70px;resize:vertical}
        .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:1em;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#6c5ce7,#00cec9);color:#fff;margin-top:8px}
        .btn:hover{transform:translateY(-2px)}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        #done{display:none;padding:20px;background:rgba(0,206,201,0.1);border-radius:12px;text-align:center;margin-top:16px}
        #done h3{color:#00cec9;margin-bottom:6px}
        #done p{color:#6b6b80;font-size:0.9em}
        .error{border-color:#ff4757 !important}
        .footer{text-align:center;margin-top:24px;color:#333;font-size:0.8em}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="checkmark">&#10003;</div>
            <h1>Payment Confirmed!</h1>
            <p class="sub">Your payment was successful. Now tell us what you need.</p>
        </div>
        <div class="form-box" id="formSection">
            <h2>Tell Us Your Requirements</h2>
            <form id="orderForm">
                <div class="fg">
                    <label>Your Email *</label>
                    <input type="email" id="email" required placeholder="Email used for payment">
                </div>
                <div class="fg">
                    <label>What product did you buy? *</label>
                    <input type="text" id="product" required placeholder="Lead List or Market Research">
                </div>
                <div class="fg">
                    <label>Industry / Niche *</label>
                    <input type="text" id="industry" required placeholder="e.g., Real Estate, SaaS, Restaurants, Healthcare">
                </div>
                <div class="fg">
                    <label>Target Location</label>
                    <input type="text" id="location" placeholder="e.g., Mumbai, Pan India, USA, Global">
                </div>
                <div class="fg">
                    <label>Specific Requirements</label>
                    <textarea id="requirements" placeholder="Any specific company types, size, revenue range, or other criteria..."></textarea>
                </div>
                <div class="fg">
                    <label>Transaction ID (optional)</label>
                    <input type="text" id="txn_id" placeholder="From your payment receipt">
                </div>
                <button type="submit" class="btn" id="submitBtn">Submit Requirements</button>
            </form>
        </div>
        <div id="done">
            <h3>Got it! &#10003;</h3>
            <p>Your requirements have been received. We'll research and deliver your report within 24 hours. You'll get an email from us shortly.</p>
        </div>
        <div class="footer"><p>Cudio Ai &mdash; AI-Powered Business Research</p></div>
    </div>
    <script>
        const API_URL = 'https://b26d011a91314f.lhr.life/api/order';
        
        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';
            
            const data = {
                email: document.getElementById('email').value,
                product: document.getElementById('product').value,
                industry: document.getElementById('industry').value,
                location: document.getElementById('location').value,
                requirements: document.getElementById('requirements').value,
                txn_id: document.getElementById('txn_id').value,
            };
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: new URLSearchParams(data)
                });
                const result = await res.json();
                if (result.success) {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('done').style.display = 'block';
                } else {
                    alert('Error: ' + (result.error || 'Could not submit'));
                    btn.disabled = false;
                    btn.textContent = 'Submit Requirements';
                }
            } catch(e) {
                alert('Network error. Please email your requirements.');
                btn.disabled = false;
                btn.textContent = 'Submit Requirements';
            }
        });
    </script>
</body>
</html>
